<template>
    <lightning-card >
        <!-- Custom Header -->
        <div slot="title">
            <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-start">
                <!-- Icon and Title -->
                <lightning-icon icon-name="standard:account" size="small" class="slds-m-right_x-small"></lightning-icon>
                <h2 class="slds-text-heading_medium slds-m-right_medium">{cardTitleFormatted}</h2>

                <!-- Action Buttons -->
                <div class="slds-grid slds-grid_vertical-align-center">
                    <!-- Refresh button -->
                    <lightning-button-icon
                        icon-name="utility:refresh"
                        variant="border-filled"
                        alternative-text="Refresh"
                        title="Refresh"
                        onclick={handleRefresh}
                        class="slds-m-right_small">
                    </lightning-button-icon>

                    <!-- Development Contact -->
                    <!-- <lightning-button-icon
                        icon-name="utility:email"
                        variant="border-filled"
                        alternative-text="Development Contact"
                        title="Development Contact"
                        onclick={handleContactClick}
                        class="slds-m-right_small">
                    </lightning-button-icon> -->

                    <!-- Development Inventory button -->
                    <lightning-button
                        label="Development Inventory"
                        variant="neutral"
                        onclick={handleInventoryClick}
                        class="slds-m-right_small">
                    </lightning-button>

                    <!-- Removed Applicants button -->
                    <lightning-button
                        label="Removed Applicants"
                        variant="neutral"
                        onclick={handleRemovedClick}>
                    </lightning-button>

                    <!-- Zoom Out button — only shown when a single property is isolated -->
                    <template if:true={isSinglePropertyMode}>
                        <lightning-button-icon
                            icon-name="utility:contract_alt"
                            variant="border-filled"
                            alternative-text="Back to Full Development View"
                            title="Back to Full Development View"
                            onclick={handleZoomOut}
                            class="slds-m-left_small">
                        </lightning-button-icon>
                    </template>
                </div>
            </div>
        </div>

        <div class="slds-p-around_medium">

            <!-- Contact Information class="contact-button slds-m-bottom_medium"> -->
                <!--<lightning-button 
                    label="✉ Development Contact" 
                    variant="neutral"
                    onclick={handleContactClick}>
                    
                </lightning-button>
                <div class="slds-m-bottom_medium"></div>-->

            <!-- Error Message -->
            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <h2>Error Loading Data</h2>
                    <p>Unable to load outreach tracking data. {errorMessage}</p>
                </div>
            </template>

            <!-- Property Sections -->
            <template for:each={propertyGroups} for:item="propertyGroup">
                <div key={propertyGroup.uniqueKey} class="property-section slds-m-bottom_large">
                    <!-- Property Header - Different color for group vs individual properties -->
                <template if:true={propertyGroup.isGroupProperty}>
                    <div class="property-header property-header-group slds-m-bottom_small">
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <div class="slds-col slds-p-vertical_small slds-p-horizontal_medium">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <!-- Property Record Link Icon -->
                                    <lightning-button-icon
                                        icon-name="utility:home"
                                        alternative-text="View Property Record"
                                        title="Open Property Record in New Tab"
                                        variant="bare-inverse"
                                        size="Large"
                                        data-property-record-id={propertyGroup.propertyRecordId}
                                        onclick={handleNavigateToProperty}
                                        class="slds-m-right_x-small">
                                    </lightning-button-icon>
                                    <h3 class="slds-text-heading_medium">
                                        {propertyGroup.name}
                                        <template if:true={propertyGroup.maxApplicationFee}>
                                            <span class="max-fee-text">(max application fee ${propertyGroup.maxApplicationFee})</span>
                                        </template>
                                    </h3>
                                </div>
                            </div>
                            <div class="slds-col slds-no-flex slds-p-right_medium">
                                <template if:false={isSinglePropertyMode}>
                                    <lightning-button-icon
                                        icon-name="utility:expand_alt"
                                        variant="border-filled"
                                        alternative-text="Isolate This Property"
                                        title="Isolate This Property"
                                        data-property-id={propertyGroup.propertyRecordId}
                                        data-development-id={propertyGroup.developmentId}
                                        onclick={handleZoomIn}>
                                    </lightning-button-icon>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <template if:false={propertyGroup.isGroupProperty}>
                    <div class="property-header property-header-individual slds-m-bottom_small">
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <div class="slds-col slds-p-vertical_small slds-p-horizontal_medium">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <!-- Property Record Link Icon -->
                                    <lightning-button-icon
                                        icon-name="utility:home"
                                        alternative-text="View Property Record"
                                        title="Open Property Record in New Tab"
                                        variant="bare-inverse"
                                        size="Large"
                                        data-property-record-id={propertyGroup.propertyRecordId}
                                        onclick={handleNavigateToProperty}
                                        class="slds-m-right_x-small">
                                    </lightning-button-icon>
                                    <h3 class="slds-text-heading_medium">
                                        {propertyGroup.name}
                                        <template if:true={propertyGroup.maxApplicationFee}>
                                            <span class="max-fee-text">(max application fee ${propertyGroup.maxApplicationFee})</span>
                                        </template>
                                    </h3>
                                </div>
                            </div>
                            <div class="slds-col slds-no-flex slds-p-right_medium">
                                <template if:false={isSinglePropertyMode}>
                                    <lightning-button-icon
                                        icon-name="utility:expand_alt"
                                        alternative-text="Isolate This Property"
                                        title="Isolate This Property"
                                        variant="border-filled"
                                        data-property-id={propertyGroup.propertyRecordId}
                                        data-development-id={propertyGroup.developmentId}
                                        onclick={handleZoomIn}>
                                    </lightning-button-icon>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                    <!-- Editable Data Table for this Property -->
                    <div class="table-container">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_fixed-layout editable-table">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <!-- Section Headers -->
                                    <th class="slds-text-title_caps section-header filled-cgph" colspan="10">
                                        FILLED IN BY CGP&H
                                    </th>
                                    <th class="slds-text-title_caps section-header filled-landlord" colspan="3">
                                        FILLED IN BY LANDLORD / DEVELOPER
                                    </th>
                                    <th class="slds-text-title_caps section-header filled-cgph" colspan="4">
                                        FILLED IN BY CGP&H
                                    </th>
                                </tr>
                                <tr class="slds-line-height_reset">
                                    <!-- Column Headers -->
                                    <th class="slds-text-title_caps column-header" scope="col">
                                        <div title="Flagged Indicator"><span style="color: red; font-size: 18px;">⚠</span></div>
                                    </th>
                                    <th class="slds-text-title_caps column-header" scope="col">
                                        <div title="Status">Status</div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Unit"
                                             data-fieldname="unit"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Unit
                                            <template if:true={isUnitSorted}>
                                                <lightning-icon icon-name={unitSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Priority"
                                             data-fieldname="priority"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            <!-- Priority -->
                                             #
                                            <template if:true={isPrioritySorted}>
                                                <lightning-icon icon-name={prioritySortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Applicant Name"
                                             data-fieldname="applicantName"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Applicant Name
                                            <template if:true={isApplicantNameSorted}>
                                                <lightning-icon icon-name={applicantNameSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header no-wrap-header" scope="col">
                                        <div class="sortable-div" title="Household Size"
                                             data-fieldname="peopleInHousehold"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                             HH
                                            <template if:true={isPeopleInHouseholdSorted}>
                                                <lightning-icon icon-name={peopleInHouseholdSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header" scope="col">
                                        <div title="Email Address">Email Address</div>
                                    </th>
                                    <th class="slds-text-title_caps column-header" scope="col">
                                        <div title="Phone Number">Phone Number</div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Date CGPH Added"
                                             data-fieldname="dateCGPHAdded"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Date CGPH Added
                                            <template if:true={isDateCGPHAddedSorted}>
                                                <lightning-icon icon-name={dateCGPHAddedSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Date Marked Primary"
                                             data-fieldname="dateMarkedPrimary"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Date Marked Primary
                                            <template if:true={isDateMarkedPrimarySorted}>
                                                <lightning-icon icon-name={dateMarkedPrimarySortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Approval / Denial"
                                             data-fieldname="approvalDenial"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Approval / Denial
                                            <template if:true={isApprovalDenialSorted}>
                                                <lightning-icon icon-name={approvalDenialSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Approve / Deny Date"
                                             data-fieldname="approveDenyDate"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Approve / Deny Date
                                            <template if:true={isApproveDenyDateSorted}>
                                                <lightning-icon icon-name={approveDenyDateSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header" scope="col">
                                        <div title="Notes">Notes</div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Ready Date"
                                             data-fieldname="readyDate"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Ready<br/> Date
                                            <template if:true={isReadyDateSorted}>
                                                <lightning-icon icon-name={readyDateSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Full Review CGPH Began"
                                             data-fieldname="fullReviewCGPHBegan"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Full Review CGPH Began
                                            <template if:true={isFullReviewCGPHBeganSorted}>
                                                <lightning-icon icon-name={fullReviewCGPHBeganSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="CGPH Status"
                                             data-fieldname="cgphDetermination"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            CGPH<br/>Status
                                            <template if:true={isCgphDeterminationSorted}>
                                                <lightning-icon icon-name={cgphDeterminationSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th class="slds-text-title_caps column-header sortable-header" scope="col">
                                        <div class="sortable-div" title="Date of Determination"
                                             data-fieldname="dateOfDetermination"
                                             data-property-id={propertyGroup.id}
                                             onclick={handleSort}>
                                            Date of Determination
                                            <template if:true={isDateOfDeterminationSorted}>
                                                <lightning-icon icon-name={dateOfDeterminationSortIcon}
                                                               size="xx-small"
                                                               class="sort-icon">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={propertyGroup.applicants} for:item="applicant">
                                    <tr key={applicant.id} class={applicant.rowCssClass} data-text-class={applicant.textCssClass}>
                                        <!-- Flagged Applicant Indicator (matching Visualforce red flag functionality) -->
                                        <td class="slds-cell-wrap" data-label="Flag">
                                            <div class="flag-container">
                                                <!-- Flagged Indicator - Only show when applicant is flagged -->
                                                <template if:true={applicant.isFlaggedForOutreach}>
                                                    <div class="flagged-indicator" title={applicant.flaggedOutreachNotes}>
                                                        <lightning-helptext 
                                                            content={applicant.flaggedOutreachNotes}
                                                            icon-name="utility:warning"
                                                            icon-variant="error">
                                                        </lightning-helptext>
                                                    </div>
                                                </template>
                                                
                                                <!-- Empty space when not flagged (maintains column width) -->
                                                <template if:false={applicant.isFlaggedForOutreach}>
                                                    <div class="no-flag-spacer"></div>
                                                </template>
                                            </div>
                                        </td>
                                        <!-- Status - EDITABLE BY CGP&H STAFF ONLY -->
                                        <td data-label="Status">
                                            <div class="status-container">
                                                <lightning-combobox
                                                    value={applicant.status}
                                                    data-id={applicant.id}
                                                    data-property={propertyGroup.id}
                                                    data-field="status"
                                                    onchange={handleFieldChange}
                                                    options={statusOptions}
                                                    disabled={isStatusDisabled}
                                                    variant="label-hidden"
                                                    class="editable-field-standard">
                                                </lightning-combobox>

                                                <!-- Show "Confirm Removal" icon button for applicants with "Removed" status -->
                                                <template if:true={applicant.isRemoved}>
                                                    <lightning-button-icon
                                                        icon-name="utility:check"
                                                        alternative-text="Confirm Removal"
                                                        title="Confirm Removal - Move to Removal Report"
                                                        variant="brand"
                                                        size="small"
                                                        data-applicant-id={applicant.id}
                                                        onclick={handleConfirmRemoval}
                                                        class="confirm-removal-icon slds-m-top_xx-small">
                                                    </lightning-button-icon>
                                                </template>
                                            </div>
                                        </td>
                                        <!-- Unit - Shows current unit and assignment actions -->
                                        <td data-label="Unit">
                                            <div class="unit-assignment-container">
                                                <!-- Current Unit Display No Link -->
                                                <div class="unit-display">
                                                    <template if:true={applicant.hasSpecificUnit}>
                                                        <span class="specific-unit">{applicant.unit}</span>
                                                        <template if:true={applicant.isGroupProperty}>
                                                            <!-- <span class="group-property-pill">Group Property</span> -->
                                                        </template>
                                                    </template>
                                                    <template if:false={applicant.hasSpecificUnit}>
                                                        <template if:true={applicant.isGroupProperty}>
                                                            <!-- <span class="group-property">Group Property</span> -->
                                                        </template>
                                                        <template if:false={applicant.isGroupProperty}>
                                                            <!-- <span class="specific-unit">—</span> -->
                                                        </template>
                                                    </template>
                                                </div>
                                                
                                                <!-- Unit Assignment Actions -->
                                                <div class="unit-actions slds-m-top_xx-small">
                                                    <!-- Show "Assign Unit" icon button for eligible applicants -->
                                                    <template if:true={applicant.canAssignUnit}>
                                                        <lightning-button-icon
                                                            icon-name="utility:new"
                                                            alternative-text="Assign Unit"
                                                            title="Assign Unit"
                                                            variant="brand"
                                                            size="small"
                                                            data-applicant-id={applicant.id}
                                                            data-property-id={propertyGroup.id}
                                                            onclick={handleAssignUnit}
                                                            class="assign-unit-icon">
                                                        </lightning-button-icon>
                                                    </template>

                                                    <!-- Show "Cancel Assignment" icon button for applicants with specific units -->
                                                    <template if:true={applicant.hasSpecificUnit}>
                                                        <lightning-button-icon
                                                            icon-name="utility:close"
                                                            alternative-text="Cancel Assignment"
                                                            title="Cancel Unit Assignment"
                                                            variant="border-filled"
                                                            size="small"
                                                            data-applicant-id={applicant.id}
                                                            onclick={handleCancelUnitAssignment}
                                                            class="cancel-assignment-icon">
                                                        </lightning-button-icon>
                                                    </template>
                                                </div>
                                            </div>
                                        </td>
                                        <!-- Priority - READ ONLY (not editable in Visualforce) -->
                                        <td data-label="Priority">
                                            <div class="readonly-text-display readonly-text-priority">
                                                {applicant.priority}
                                            </div>
                                            <!-- <lightning-input
                                                type="text"
                                                value={applicant.priority}
                                                disabled={isPriorityDisabled}
                                                readonly
                                                variant="label-hidden"
                                                class="editable-field-priority readonly-field">
                                            </lightning-input> -->
                                        </td>
                                                                             
                                        <!-- NEW - Add icon to the left of name -->
                                        <!-- Applicant Name - READ ONLY (not editable) -->
                                         <td data-label="Applicant Name">
                                            <div class="applicant-name-container">
                                               <!-- Link to Outreach Tracking Record -->
                                                 <lightning-button-icon
                                                    icon-name="utility:open"
                                                    alternative-text="View Record"
                                                    title="View Outreach Tracking Record"
                                                    variant="bare"
                                                    size="small"
                                                    data-record-id={applicant.id}
                                                    onclick={handleNavigateToRecord}
                                                    class="record-link-icon">
                                                </lightning-button-icon>

                                                <!-- Link to Report with Pre-Applicant and Property IDs -->
                                                <lightning-button-icon
                                                    icon-name="utility:file"
                                                    alternative-text="View Report"
                                                    title="View Report for this Applicant and Property"
                                                    variant="bare"
                                                    size="small"
                                                    data-pre-applicant-id={applicant.preApplicantId}
                                                    data-property-id={applicant.propertyIdForReport}
                                                    onclick={handleNavigateToReport}
                                                    class="record-link-icon">
                                                </lightning-button-icon>

                                                <div class="readonly-text-display readonly-text-name-with-icon">
                                                  {applicant.applicantName}
                                                   </div>
                                            </div>
                                         </td>
                                        <!-- Number of People in Household - READ ONLY (not editable in Visualforce) -->
                                        <td data-label="Number of People in Household">
                                            <div class="readonly-text-display readonly-text-household">
                                                {applicant.peopleInHousehold}
                                            </div>
                                            <!-- <lightning-input
                                                type="number"
                                                value={applicant.peopleInHousehold}
                                                disabled={isPeopleInHouseholdDisabled}
                                                readonly
                                                variant="label-hidden"
                                                class="editable-field-household readonly-field">
                                            </lightning-input> -->
                                        </td>
                                        <!-- Email - READ ONLY (not editable in Visualforce) -->
                                        <td data-label="Email Address">
                                            <div class="readonly-text-display readonly-text-email">
                                                {applicant.email}
                                            </div>
                                            <!-- <lightning-input
                                                type="email"
                                                value={applicant.email}
                                                disabled={isEmailDisabled}
                                                readonly
                                                variant="label-hidden"
                                                class="editable-field-email readonly-field">
                                            </lightning-input> -->
                                        </td>
                                        <!-- Phone - READ ONLY (not editable in Visualforce) -->
                                        <td data-label="Phone Number">
                                            <div class="readonly-text-display readonly-text-phone">
                                                {applicant.phone}
                                            </div>
                                            <!-- <lightning-input
                                                type="tel"
                                                value={applicant.phone}
                                                disabled={isPhoneDisabled}
                                                readonly
                                                variant="label-hidden"
                                                class="editable-field-phone readonly-field">
                                            </lightning-input> -->
                                        </td>
                                        <!-- Date CGPH Added - EDITABLE BY CGP&H STAFF ONLY -->
                                        <td data-label="Date CGPH Added">
                                            <lightning-input 
                                                type="date" 
                                                value={applicant.dateCGPHAdded}
                                                data-id={applicant.id}
                                                data-property={propertyGroup.id}
                                                data-field="dateCGPHAdded"
                                                onchange={handleFieldChange}
                                                disabled={isDateCGPHAddedDisabled}
                                                variant="label-hidden"
                                                class="editable-field-date">
                                            </lightning-input>
                                        </td>
                                        <!-- Date Marked Primary - EDITABLE BY CGP&H STAFF ONLY -->
                                        <td data-label="Date Marked Primary">
                                            <lightning-input 
                                                type="date" 
                                                value={applicant.dateMarkedPrimary}
                                                data-id={applicant.id}
                                                data-property={propertyGroup.id}
                                                data-field="dateMarkedPrimary"
                                                onchange={handleFieldChange}
                                                disabled={isDateMarkedPrimaryDisabled}
                                                variant="label-hidden"
                                                class="editable-field-date">
                                            </lightning-input>
                                        </td>
                                        <!-- Approval / Denial - EDITABLE BY LANDLORD/DEVELOPER ONLY -->
                                        <td data-label="Approval / Denial">
                                            <lightning-combobox
                                                value={applicant.approvalDenial}
                                                data-id={applicant.id}
                                                data-property={propertyGroup.id}
                                                data-field="approvalDenial"
                                                onchange={handleFieldChange}
                                                options={approvalOptions}
                                                disabled={isApprovalDenialDisabled}
                                                variant="label-hidden"
                                                class="editable-field-standard">
                                            </lightning-combobox>
                                        </td>
                                        <!-- Approve / Deny Date - EDITABLE BY LANDLORD/DEVELOPER ONLY -->
                                        <td data-label="Approve / Deny Date">
                                            <lightning-input 
                                                type="date" 
                                                value={applicant.approveDenyDate}
                                                data-id={applicant.id}
                                                data-property={propertyGroup.id}
                                                data-field="approveDenyDate"
                                                onchange={handleFieldChange}
                                                disabled={isApproveDenyDateDisabled}
                                                variant="label-hidden"
                                                class="editable-field-date">
                                            </lightning-input>
                                        </td>
                                        <!-- Notes - READ ONLY (click to view full notes) -->
                                         <td class="slds-cell-wrap notes-cell" data-label="Notes">
                                            <div class="notes-full-text">
                                                {applicant.notes}
                                            </div>
                                         </td>
                                        <!-- <td class="slds-cell-wrap" data-label="Notes"> -->
                                            <!-- <div class="notes-cell-container"

    <template if:true={isFlowOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" variant="bare" alternative-text="Close" onclick={handleFlowClose} class="slds-modal__close" data-id="close-flow"></lightning-button-icon>
                    <h2 class="slds-text-heading_medium">Assign Unit</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-flow
                        flow-api-name={flowApiName}
                        flow-input-variables={flowInputs}
                        onstatuschange={handleFlowStatus}>
                    </lightning-flow>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
